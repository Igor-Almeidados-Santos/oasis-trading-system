[tool.poetry]
name = "oasis-trading-system"
version = "1.0.0"
description = "High-Performance Algorithmic Cryptocurrency Trading Bot"
authors = ["Oasis Team <team@oasis-trading.com>"]
license = "MIT"
readme = "README.md"
homepage = "https://github.com/oasis-trading/oasis-trading-system"
repository = "https://github.com/oasis-trading/oasis-trading-system"
documentation = "https://docs.oasis-trading.com"
keywords = ["cryptocurrency", "trading", "algorithmic", "bot", "finance"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Financial and Insurance Industry",
    "Topic :: Office/Business :: Financial :: Investment",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Framework :: FastAPI",
]
packages = [{include = "src"}]
include = [
    "config/*.yaml",
    "config/*.json",
    "static/**/*",
    "templates/**/*",
]

[tool.poetry.dependencies]
python = "^3.11"

# Core Framework
fastapi = "^0.104.0"
uvicorn = {extras = ["standard"], version = "^0.24.0"}
pydantic = "^2.4.0"
pydantic-settings = "^2.0.0"

# Database
asyncpg = "^0.29.0"
sqlalchemy = {extras = ["asyncio"], version = "^2.0.0"}
alembic = "^1.12.0"
psycopg2-binary = "^2.9.0"
redis = {extras = ["hiredis"], version = "^5.0.0"}

# Trading & Market Data
ccxt = {extras = ["async"], version = "^4.1.0"}
pandas = "^2.1.0"
numpy = "^1.25.0"
ta = "^0.11.0"
python-binance = "^1.0.17"
websocket-client = "^1.6.0"
aiohttp = "^3.9.0"
yfinance = "^0.2.0"
alpaca-py = "^0.9.0"

# Machine Learning
torch = "^2.1.0"
scikit-learn = "^1.3.0"
xgboost = "^2.0.0"
optuna = "^3.4.0"
tensorboard = "^2.15.0"
transformers = "^4.35.0"
stable-baselines3 = "^2.2.0"

# Data Processing
polars = "^0.19.0"
pyarrow = "^14.0.0"
numba = "^0.58.0"

# Messaging & Events
aiokafka = "^0.10.0"
confluent-kafka = "^2.3.0"
celery = {extras = ["redis"], version = "^5.3.0"}
kombu = "^5.3.0"

# API & Serialization
httpx = "^0.25.0"
orjson = "^3.9.0"
msgpack = "^1.0.0"
protobuf = "^4.25.0"
grpcio = "^1.60.0"
grpcio-tools = "^1.60.0"
graphene = "^3.3.0"

# Security
cryptography = "^41.0.0"
pyjwt = {extras = ["crypto"], version = "^2.8.0"}
python-jose = {extras = ["cryptography"], version = "^3.3.0"}
passlib = {extras = ["bcrypt"], version = "^1.7.0"}
python-multipart = "^0.0.6"
hvac = "^2.0.0"  # HashiCorp Vault

# Monitoring & Logging
prometheus-client = "^0.19.0"
opentelemetry-api = "^1.21.0"
opentelemetry-sdk = "^1.21.0"
opentelemetry-instrumentation-fastapi = "^0.42b0"
loguru = "^0.7.0"
python-json-logger = "^2.0.0"
sentry-sdk = {extras = ["fastapi"], version = "^1.38.0"}

# Utils
python-dotenv = "^1.0.0"
click = "^8.1.0"
typer = "^0.9.0"
rich = "^13.7.0"
pendulum = "^3.0.0"
pyyaml = "^6.0.0"
ujson = "^5.9.0"

# Development Tools
ipython = {version = "^8.18.0", optional = true}
jupyter = {version = "^1.0.0", optional = true}

[tool.poetry.group.dev.dependencies]
# Testing
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
pytest-mock = "^3.12.0"
pytest-xdist = "^3.5.0"
pytest-benchmark = "^4.0.0"
pytest-timeout = "^2.2.0"
pytest-html = "^4.1.0"
pytest-sugar = "^0.9.0"
faker = "^20.1.0"
factory-boy = "^3.3.0"
hypothesis = "^6.92.0"

# Code Quality
black = "^23.11.0"
isort = "^5.13.0"
flake8 = "^6.1.0"
flake8-docstrings = "^1.7.0"
flake8-import-order = "^0.18.2"
flake8-bugbear = "^23.9.0"
mypy = "^1.7.0"
pylint = "^3.0.0"
bandit = {extras = ["toml"], version = "^1.7.0"}
safety = "^3.0.0"
pre-commit = "^3.5.0"

# Development Tools
ipdb = "^0.13.0"
pdbpp = "^0.10.3"
notebook = "^7.0.0"
jupyterlab = "^4.0.0"

# Performance
memory-profiler = "^0.61.0"
line-profiler = "^4.1.0"
py-spy = "^0.3.14"

# Type stubs
types-requests = "^2.31.0"
types-PyYAML = "^6.0.0"
types-python-dateutil = "^2.8.0"
types-redis = "^4.6.0"

[tool.poetry.group.docs.dependencies]
mkdocs = "^1.5.0"
mkdocs-material = "^9.5.0"
mkdocstrings = {extras = ["python"], version = "^0.24.0"}
mkdocs-mermaid2-plugin = "^1.1.0"

[tool.poetry.extras]
dev = ["ipython", "jupyter"]
all = ["ipython", "jupyter"]

[tool.poetry.scripts]
ots = "src.cli.main:app"
ots-api = "src.api.rest.main:run"
ots-worker = "src.workers.main:run"
ots-backtest = "src.backtest.main:run"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

# ===== TOOL CONFIGURATIONS =====

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
src_paths = ["src", "tests"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_unimported = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
check_untyped_defs = true
strict_equality = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = [
    "ccxt.*",
    "ta.*",
    "binance.*",
    "kafka.*",
    "confluent_kafka.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = [
    "-ra",
    "-q",
    "--strict-markers",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-report=xml",
    "--cov-config=pyproject.toml",
]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "e2e: marks tests as end-to-end tests",
]

[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__init__.py",
    "*/migrations/*",
]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]

[tool.pylint.messages_control]
disable = [
    "C0111",  # missing-docstring
    "C0103",  # invalid-name
    "R0903",  # too-few-public-methods
    "R0801",  # duplicate-code
    "W0212",  # protected-access
]

[tool.bandit]
exclude_dirs = ["tests", "docs"]
severity = "medium"
confidence = "medium"
skips = ["B101", "B601"]

[tool.ruff]
line-length = 100
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
]
target-version = "py311"

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**/*.py" = ["S101", "S311"]