version: '3.9'

services:
  # ===========================================
  # Database Services
  # ===========================================
  
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: ots-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oasis_trading}
      POSTGRES_USER: ${POSTGRES_USER:-oasis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oasis_secure_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oasis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oasis-network

  redis:
    image: redis:7-alpine
    container_name: ots-redis
    restart: unless-stopped
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 2gb 
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oasis-network

  # ===========================================
  # Message Queue Services
  # ===========================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: ots-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - oasis-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: ots-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - oasis-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ots-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - oasis-network

  # ===========================================
  # Application Services
  # ===========================================
  
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    image: oasis-trading/api:latest
    container_name: ots-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-oasis}:${POSTGRES_PASSWORD:-oasis_secure_password}@postgres:5432/${POSTGRES_DB:-oasis_trading}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-jwt-secret-key-here}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - api_logs:/app/logs
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - oasis-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    image: oasis-trading/worker:latest
    container_name: ots-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-oasis}:${POSTGRES_PASSWORD:-oasis_secure_password}@postgres:5432/${POSTGRES_DB:-oasis_trading}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/2
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - worker_logs:/app/logs
    networks:
      - oasis-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 2G

  scheduler:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    image: oasis-trading/worker:latest
    container_name: ots-scheduler
    restart: unless-stopped
    command: ["celery", "-A", "src.workers.celery_app", "beat", "--loglevel=info"]
    depends_on:
      - redis
      - worker
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/2
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
    networks:
      - oasis-network

  # ===========================================
  # Monitoring Services
  # ===========================================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: ots-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - oasis-network

  grafana:
    image: grafana/grafana:latest
    container_name: ots-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - oasis-network

  # ===========================================
  # Development Services (Optional)
  # ===========================================
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ots-pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@oasis-trading.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - oasis-network

  flower:
    image: mher/flower:latest
    container_name: ots-flower
    restart: unless-stopped
    profiles: ["dev"]
    command: ["celery", "--broker=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/1", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - oasis-network

  # ===========================================
  # Load Balancer / Reverse Proxy
  # ===========================================
  
  traefik:
    image: traefik:v3.0
    container_name: ots-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8090:8080"  # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_certs:/certs
    networks:
      - oasis-network

# ===========================================
# Networks
# ===========================================

networks:
  oasis-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ===========================================
# Volumes
# ===========================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  pgadmin_data:
    driver: local
  api_logs:
    driver: local
  worker_logs:
    driver: local
  traefik_certs:
    driver: local